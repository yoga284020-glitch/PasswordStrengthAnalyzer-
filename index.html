<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Analyzer</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f0f4f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#fff;
    width:350px;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#333;
}

input{
    width:100%;
    padding:10px;
    font-size:16px;
    margin-top:15px;
    border-radius:5px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:10px;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}

#strength{
    margin-top:20px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

ul{
    padding-left:20px;
}
</style>

</head>
<body>

<div class="container">

<h2>Password Strength Analyzer</h2>

<input type="password" id="password"
placeholder="Enter Password"
onkeyup="checkPassword()">

<button onclick="togglePassword()">👁 Show / Hide Password</button>

<h3 id="strength"></h3>

<h4>Suggestions</h4>

<ul id="suggestions"></ul>

</div>

<script>

function checkPassword(){

let password=document.getElementById("password").value;

let score=0;
let suggestions=[];

if(password.length>=8){
score++;
}else{
suggestions.push("Use at least 8 characters");
}

if(/[A-Z]/.test(password)){
score++;
}else{
suggestions.push("Add one uppercase letter");
}

if(/[a-z]/.test(password)){
score++;
}else{
suggestions.push("Add one lowercase letter");
}

if(/[0-9]/.test(password)){
score++;
}else{
suggestions.push("Add one number");
}

if(/[!@#$%^&*]/.test(password)){
score++;
}else{
suggestions.push("Add one special character");
}

let strength=document.getElementById("strength");

if(score<=2){
strength.innerHTML="🔴 Weak Password";
strength.style.color="red";
}
else if(score<=4){
strength.innerHTML="🟡 Medium Password";
strength.style.color="orange";
}
else{
strength.innerHTML="🟢 Strong Password";
strength.style.color="green";
}

let list=document.getElementById("suggestions");
list.innerHTML="";

if(suggestions.length==0){
list.innerHTML="<li>Excellent! Your password is strong.</li>";
}
else{
for(let i=0;i<suggestions.length;i++){
list.innerHTML+="<li>"+suggestions[i]+"</li>";
}
}

}

function togglePassword(){

let password=document.getElementById("password");

if(password.type==="password"){
password.type="text";
}
else{
password.type="password";
}

}

</script>

</body>
</html>
